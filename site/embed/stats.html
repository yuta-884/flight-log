<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>flight-log passport</title>
  <style>
    /* パスポート風の埋め込みカード。iframeで外部ブログから参照される想定なので
       ページ背景は透過、カード単体で完結するスタイルにする */
    :root {
      --paper: #f5f1e4;
      --ink: #2b3a8f;      /* パスポートの印字ブルー */
      --ink-strong: #1d2a6e;
      --text: #3a3a3a;
      --land-w: #9fd6ae;   /* 西半球の陸地 */
      --land-e: #a9d3e8;   /* 東半球の陸地 */
      --route: #c1773c;
      --dot: #d94f46;
      --cover: #1d2a6e;    /* パスポート表紙の紺 */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: transparent; }
    body { font-family: system-ui, -apple-system, sans-serif; color: var(--text); display: flex; justify-content: center; padding: 4px; }
    .passport {
      width: 100%; max-width: 640px;
      background: var(--cover);
      border-radius: 26px;
      padding: 10px 0 6px;
      box-shadow: 0 12px 34px rgba(20, 30, 80, .25);
    }
    .page {
      background:
        repeating-radial-gradient(ellipse 140% 90% at 50% -30%, transparent 0 7px, rgba(43, 58, 143, .035) 7px 8px),
        repeating-radial-gradient(ellipse 140% 90% at 50% 130%, transparent 0 7px, rgba(43, 58, 143, .035) 7px 8px),
        var(--paper);
      border-radius: 18px 18px 24px 24px;
      margin: 0 4px;
      overflow: hidden;
    }
    .strip {
      display: flex; justify-content: center; gap: 1.1rem; padding: .45rem 0 .1rem;
      color: #b9c2e6; font-size: .7rem; letter-spacing: .35em; user-select: none;
      white-space: nowrap; overflow: hidden;
    }
    #map { display: block; width: 100%; }
    .flags { text-align: center; padding: 0 1rem .9rem; line-height: 1; }
    .flags span {
      display: inline-block; width: 1.7rem; height: 1.7rem; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25);
      font-size: 1.25rem; line-height: 1.7rem; text-align: center; overflow: hidden;
      margin: 0 -0.22rem;
    }
    .tear {
      border: none; border-top: 2px dashed #c9c2ab; margin: 0;
      position: relative;
    }
    .body { padding: 1.1rem 1.5rem 0.8rem; }
    h1 {
      color: var(--ink); font-size: 1.55rem; letter-spacing: .12em; margin: 0 0 .2rem;
      font-weight: 800;
    }
    .subtitle { color: #6b6b6b; font-size: .72rem; font-weight: 700; letter-spacing: .18em; margin-bottom: 1.1rem; }
    .subtitle::before { content: '⬤▬ '; color: #444; font-size: .6rem; letter-spacing: 0; }
    .idrow { display: flex; gap: 1.5rem; align-items: flex-start; }
    .bignum { line-height: 1; }
    .bignum .n { font-size: 3.6rem; font-weight: 800; color: #333; letter-spacing: -.02em; }
    .bignum .u { display: block; font-size: 2rem; color: var(--ink); font-weight: 500; margin-top: .2rem; }
    .fields { flex: 1; display: grid; gap: .5rem; font-size: .95rem; padding-top: .3rem; }
    .fields .k { color: var(--ink); font-weight: 600; margin-right: .4rem; }
    .stats { display: flex; gap: 1rem; justify-content: space-between; margin: 1.3rem 0 .9rem; flex-wrap: wrap; }
    .stat .k { color: var(--ink); font-weight: 600; font-size: .95rem; }
    .stat .v { font-size: 1.7rem; font-weight: 800; color: #333; }
    .stat .v small { font-weight: 500; color: #666; font-size: 1.1rem; }
    .mrz {
      border-top: 1px solid #d8d2bd; padding: .55rem .2rem .3rem; margin: 0 -0.4rem;
      font-family: 'Courier New', ui-monospace, monospace; font-weight: 700;
      font-size: clamp(.55rem, 2.4vw, .82rem); letter-spacing: .06em; color: #555;
      white-space: pre; overflow: hidden;
    }
    @media (max-width: 480px) {
      .idrow { gap: 1rem; }
      .bignum .n { font-size: 2.7rem; }
      .bignum .u { font-size: 1.5rem; }
      .fields { font-size: .8rem; }
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="passport">
    <div class="page">
      <div class="strip" id="strip">✈ ✈ ✈</div>
      <canvas id="map"></canvas>
      <div class="flags" id="flags"></div>
      <hr class="tear">
      <div class="body">
        <h1>MY FLIGHT PASSPORT</h1>
        <div class="subtitle">PASSPORT・PASS・PASAPORTE</div>
        <div class="idrow">
          <div class="bignum"><span class="n" id="flights">–</span><span class="u">flights</span></div>
          <div class="fields">
            <div><span class="k">Authority</span> flight-log</div>
            <div><span class="k">Place of issue</span> <span id="issue-place">–</span></div>
            <div><span class="k">Date of issue</span> <span id="issue-date">–</span></div>
            <div><span class="k">Member since</span> <span id="member-since">–</span></div>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="k">Distance</div><div class="v"><span id="distance">–</span> <small>km</small></div></div>
          <div class="stat"><div class="k">Flight Time</div><div class="v" id="flight-time">–</div></div>
          <div class="stat"><div class="k">Airports</div><div class="v" id="airports">–</div></div>
          <div class="stat"><div class="k">Airlines</div><div class="v" id="airlines">–</div></div>
        </div>
        <div class="mrz" id="mrz"></div>
      </div>
    </div>
  </div>

  <script>
    const fmt = (n) => n.toLocaleString('en-US');
    const flagOf = (cc) => String.fromCodePoint(...[...cc].map((c) => 0x1f1e6 + c.charCodeAt(0) - 65));
    const passportDate = (iso) => {
      const d = new Date(iso);
      const mon = d.toLocaleString('en-US', { month: 'short' }).toUpperCase();
      return `${String(d.getDate()).padStart(2, '0')} ${mon} ${String(d.getFullYear()).slice(2)}`;
    };
    const mrzLine = (s) => (s.toUpperCase().replace(/[^A-Z0-9<.@-]/g, '') + '<'.repeat(44)).slice(0, 44);

    // 等長方形図法（アンタークティカは切る）。ルートは大圏をslerpで近似
    const LAT_TOP = 84, LAT_BOTTOM = -58;
    function project(lon, lat, W, H) {
      return [((lon + 180) / 360) * W, ((LAT_TOP - lat) / (LAT_TOP - LAT_BOTTOM)) * H];
    }
    function greatCircle(a, b, n = 48) {
      const rad = Math.PI / 180;
      const p1 = [Math.cos(a.lat * rad) * Math.cos(a.lon * rad), Math.cos(a.lat * rad) * Math.sin(a.lon * rad), Math.sin(a.lat * rad)];
      const p2 = [Math.cos(b.lat * rad) * Math.cos(b.lon * rad), Math.cos(b.lat * rad) * Math.sin(b.lon * rad), Math.sin(b.lat * rad)];
      const omega = Math.acos(Math.min(1, p1[0] * p2[0] + p1[1] * p2[1] + p1[2] * p2[2]));
      const pts = [];
      for (let i = 0; i <= n; i++) {
        const t = i / n;
        const s1 = Math.sin((1 - t) * omega) / Math.sin(omega), s2 = Math.sin(t * omega) / Math.sin(omega);
        const v = [s1 * p1[0] + s2 * p2[0], s1 * p1[1] + s2 * p2[1], s1 * p1[2] + s2 * p2[2]];
        pts.push({ lon: Math.atan2(v[1], v[0]) / rad, lat: Math.asin(v[2] / Math.hypot(...v)) / rad });
      }
      return pts;
    }

    function drawMap(geo, globe) {
      const canvas = document.getElementById('map');
      const cssW = canvas.parentElement.clientWidth;
      const cssH = Math.round(cssW * 0.46);
      const dpr = devicePixelRatio || 1;
      canvas.width = cssW * dpr; canvas.height = cssH * dpr;
      canvas.style.height = cssH + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      const W = cssW, H = cssH;

      // 陸地（西半球=緑、東半球=青のパスポート風2トーン）
      for (const f of geo.features) {
        const polys = f.geometry.type === 'Polygon' ? [f.geometry.coordinates] : f.geometry.coordinates;
        const firstLon = polys[0][0][0][0];
        ctx.fillStyle = firstLon < -30 ? 'var(--land-w)' : 'var(--land-e)';
        ctx.fillStyle = firstLon < -30 ? '#9fd6ae' : '#a9d3e8';
        for (const poly of polys) {
          ctx.beginPath();
          for (const ring of poly) {
            ring.forEach(([lon, lat], i) => {
              const [x, y] = project(lon, lat, W, H);
              i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.closePath();
          }
          ctx.fill('evenodd');
        }
      }
      // ルート（大圏アーク）
      ctx.strokeStyle = '#c1773c'; ctx.globalAlpha = 0.85; ctx.lineWidth = 1.4;
      for (const r of globe.routes) {
        const pts = greatCircle(r.from, r.to);
        ctx.beginPath();
        let prev = null;
        for (const p of pts) {
          const [x, y] = project(p.lon, p.lat, W, H);
          if (prev && Math.abs(p.lon - prev.lon) > 180) { ctx.moveTo(x, y); } // 日付変更線をまたぐ区間は線を切る
          else if (prev) ctx.lineTo(x, y);
          else ctx.moveTo(x, y);
          prev = p;
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      // 空港ドット
      for (const a of globe.airports) {
        const [x, y] = project(a.lon, a.lat, W, H);
        ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#d94f46'; ctx.fill();
        ctx.lineWidth = 1.4; ctx.strokeStyle = '#f6efe0'; ctx.stroke();
      }
    }

    Promise.all([
      fetch('../data/stats.json').then((r) => r.json()),
      fetch('../vendor/countries.geojson').then((r) => r.json()),
    ]).then(([s, geo]) => {
      document.getElementById('flights').textContent = s.total_flights;
      document.getElementById('distance').textContent = fmt(s.total_distance_km);
      const min = s.flight_time.total_minutes;
      const d = Math.floor(min / 1440), h = Math.floor((min % 1440) / 60);
      document.getElementById('flight-time').innerHTML = `${d}<small>d</small> ${h}<small>h</small>`;
      document.getElementById('airports').textContent = s.airports.count;
      document.getElementById('airlines').textContent = s.airlines.count;

      const home = s.airports.ranking[0]?.iata ?? '';
      document.getElementById('issue-place').textContent = home;
      document.getElementById('issue-date').textContent = passportDate(s.generated_at);
      document.getElementById('member-since').textContent = passportDate(s.first_flight_date);

      const flags = document.getElementById('flags');
      for (const v of s.countries.including_layovers.visits) {
        flags.insertAdjacentHTML('beforeend', `<span title="${v.country_name}">${flagOf(v.country_code)}</span>`);
      }

      const strip = document.getElementById('strip');
      strip.textContent = `✈  ✈  ✈  ◉ ${home}  ✈  ✈  ✈  ✈  ◉ ${home}  ✈  ✈  ✈`;

      const since = passportDate(s.first_flight_date).replaceAll(' ', '');
      const issued = passportDate(s.generated_at).replaceAll(' ', '');
      document.getElementById('mrz').textContent =
        mrzLine(`ALLTIME<<<<SINCE${since}<<@FLIGHT-LOG`) + '\n' +
        mrzLine(`ISSUED${issued}${home}<<<<<<<<<<<<<<<GITHUB.COM`);

      drawMap(geo, s.globe);
      addEventListener('resize', () => drawMap(geo, s.globe));
    }).catch(() => {
      document.body.innerHTML = '<p style="font-family:system-ui">Failed to load stats.</p>';
    });
  </script>
</body>
</html>
