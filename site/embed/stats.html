<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>my flight log</title>
  <meta property="og:title" content="MY FLIGHT LOG">
  <meta property="og:description" content="Personal flight stats — routes, distance, flight time and countries.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://yuta-884.github.io/flight-log/embed/stats.html">
  <style>
    /* 埋め込みカード。統計ページと同じダークトーン（iframeで外部ブログから参照される
       想定のためテーマ切替はせずダーク固定、ページ背景は透過） */
    :root {
      --fg: #eef0fa; --muted: #8e93ad; --card: #151827;
      --accent: #6f96ff; --accent2: #3fe0d0; --row: #232841;
      --land: rgba(111, 150, 255, .26);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: transparent; }
    body { font-family: system-ui, -apple-system, sans-serif; color: var(--fg); display: flex; justify-content: center; padding: 4px; }
    .card {
      width: 100%; max-width: 640px;
      position: relative; border-radius: 1.1rem; overflow: hidden;
      background: linear-gradient(155deg, color-mix(in srgb, var(--card) 88%, var(--accent)) 0%, var(--card) 45%);
      box-shadow: 0 20px 50px rgba(30, 60, 180, .22), 0 2px 12px rgba(0, 0, 0, .45);
      padding: 1.2rem 1.4rem 1rem;
    }
    .card::before {
      content: ''; position: absolute; inset: 0 0 auto 0; height: 1px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent2) 55%, transparent), transparent);
    }
    .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .6rem; }
    h1 {
      font-size: 1.35rem; font-weight: 800; letter-spacing: .1em; margin: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .tagline { font-size: .66rem; font-weight: 700; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; }
    #map { display: block; width: 100%; border-radius: .6rem; }
    .flags { text-align: center; padding: .7rem 0 .9rem; line-height: 1.6; }
    .flags span {
      display: inline-block; width: 1.6rem; height: 1.6rem; border-radius: 50%;
      background: var(--row); box-shadow: 0 1px 4px rgba(0, 0, 0, .4);
      font-size: 1.15rem; line-height: 1.6rem; text-align: center; overflow: hidden;
      margin: 0 -0.18rem;
    }
    .divider {
      height: 1px; border: none; margin: 0 0 1rem;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 45%, transparent), transparent);
    }
    .idrow { display: flex; gap: 1.6rem; align-items: flex-start; }
    .bignum { line-height: 1; }
    .bignum .n {
      font-size: 3.2rem; font-weight: 800; letter-spacing: -.01em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .bignum .u { display: block; font-size: 1.5rem; color: var(--muted); font-weight: 500; margin-top: .25rem; }
    .fields { flex: 1; display: grid; gap: .45rem; font-size: .9rem; padding-top: .25rem; }
    .fields .k { color: var(--muted); font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; display: block; }
    .stats { display: flex; gap: 1rem; justify-content: space-between; margin: 1.2rem 0 1rem; flex-wrap: wrap; }
    .stat .k { color: var(--muted); font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; }
    .stat .v { font-size: 1.5rem; font-weight: 800; }
    .stat .v small { font-weight: 500; color: var(--muted); font-size: .95rem; }
    .mrz {
      border-top: 1px solid var(--row); padding-top: .5rem;
      font-family: 'Courier New', ui-monospace, monospace; font-weight: 700;
      font-size: clamp(.58rem, 2.3vw, .8rem); letter-spacing: .05em; color: var(--muted);
    }
    .mrz .line { display: flex; white-space: nowrap; }
    .mrz .fill { flex: 1; overflow: hidden; } /* '<'の連続を横幅いっぱいまで敷き詰めてクリップ */
    @media (max-width: 480px) {
      .idrow { gap: 1rem; }
      .bignum .n { font-size: 2.5rem; }
      .bignum .u { font-size: 1.2rem; }
      h1 { font-size: 1.05rem; }
      .tagline { display: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <h1>MY FLIGHT LOG</h1>
      <div class="tagline">Personal Flight Stats</div>
    </div>
    <canvas id="map"></canvas>
    <div class="flags" id="flags"></div>
    <hr class="divider">
    <div class="idrow">
      <div class="bignum"><span class="n" id="flights">–</span><span class="u">flights</span></div>
      <div class="fields">
        <div><span class="k">Home base</span> <span id="home-base">–</span></div>
        <div><span class="k">First flight</span> <span id="first-flight">–</span></div>
        <div><span class="k">Issued</span> <span id="updated">–</span></div>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="k">Distance</div><div class="v"><span id="distance">–</span> <small>km</small></div></div>
      <div class="stat"><div class="k">Flight Time</div><div class="v" id="flight-time">–</div></div>
      <div class="stat"><div class="k">Airports</div><div class="v" id="airports">–</div></div>
      <div class="stat"><div class="k">Airlines</div><div class="v" id="airlines">–</div></div>
    </div>
    <div class="mrz" id="mrz"></div>
  </div>

  <script>
    const fmt = (n) => n.toLocaleString('en-US');
    const flagOf = (cc) => String.fromCodePoint(...[...cc].map((c) => 0x1f1e6 + c.charCodeAt(0) - 65));
    const shortDate = (iso) => {
      const d = new Date(iso);
      const mon = d.toLocaleString('en-US', { month: 'short' }).toUpperCase();
      return `${String(d.getDate()).padStart(2, '0')} ${mon} ${String(d.getFullYear()).slice(2)}`;
    };
    const FILL = '<'.repeat(400);

    // 等長方形図法（南極は切る）。ルートは大圏をslerpで近似
    const LAT_TOP = 84, LAT_BOTTOM = -58;
    function project(lon, lat, W, H) {
      return [((lon + 180) / 360) * W, ((LAT_TOP - lat) / (LAT_TOP - LAT_BOTTOM)) * H];
    }
    function greatCircle(a, b, n = 48) {
      const rad = Math.PI / 180;
      const p1 = [Math.cos(a.lat * rad) * Math.cos(a.lon * rad), Math.cos(a.lat * rad) * Math.sin(a.lon * rad), Math.sin(a.lat * rad)];
      const p2 = [Math.cos(b.lat * rad) * Math.cos(b.lon * rad), Math.cos(b.lat * rad) * Math.sin(b.lon * rad), Math.sin(b.lat * rad)];
      const omega = Math.acos(Math.min(1, p1[0] * p2[0] + p1[1] * p2[1] + p1[2] * p2[2]));
      const pts = [];
      for (let i = 0; i <= n; i++) {
        const t = i / n;
        const s1 = Math.sin((1 - t) * omega) / Math.sin(omega), s2 = Math.sin(t * omega) / Math.sin(omega);
        const v = [s1 * p1[0] + s2 * p2[0], s1 * p1[1] + s2 * p2[1], s1 * p1[2] + s2 * p2[2]];
        pts.push({ lon: Math.atan2(v[1], v[0]) / rad, lat: Math.asin(v[2] / Math.hypot(...v)) / rad });
      }
      return pts;
    }

    function drawMap(geo, globe) {
      const canvas = document.getElementById('map');
      const W = canvas.parentElement.querySelector('.head').clientWidth; // カード内側（パディング除く）の幅に合わせる
      const H = Math.round(W * 0.46);
      const dpr = devicePixelRatio || 1;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.height = H + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      // 陸地（単一色に統一）
      ctx.fillStyle = 'rgba(111, 150, 255, .26)';
      for (const f of geo.features) {
        const polys = f.geometry.type === 'Polygon' ? [f.geometry.coordinates] : f.geometry.coordinates;
        for (const poly of polys) {
          ctx.beginPath();
          for (const ring of poly) {
            ring.forEach(([lon, lat], i) => {
              const [x, y] = project(lon, lat, W, H);
              i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.closePath();
          }
          ctx.fill('evenodd');
        }
      }
      // ルート（大圏アーク、アクセントシアン）
      ctx.strokeStyle = '#3fe0d0'; ctx.globalAlpha = 0.55; ctx.lineWidth = 1.2;
      for (const r of globe.routes) {
        const pts = greatCircle(r.from, r.to);
        ctx.beginPath();
        let prev = null;
        for (const p of pts) {
          const [x, y] = project(p.lon, p.lat, W, H);
          if (prev && Math.abs(p.lon - prev.lon) > 180) { ctx.moveTo(x, y); } // 日付変更線をまたぐ区間は線を切る
          else if (prev) ctx.lineTo(x, y);
          else ctx.moveTo(x, y);
          prev = p;
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      // 空港ドット
      for (const a of globe.airports) {
        const [x, y] = project(a.lon, a.lat, W, H);
        ctx.beginPath(); ctx.arc(x, y, 3.2, 0, Math.PI * 2);
        ctx.fillStyle = '#6f96ff'; ctx.fill();
        ctx.lineWidth = 1.2; ctx.strokeStyle = '#0c1122'; ctx.stroke();
      }
    }

    Promise.all([
      fetch('../data/stats.json').then((r) => r.json()),
      fetch('../vendor/countries.geojson').then((r) => r.json()),
    ]).then(([s, geo]) => {
      document.getElementById('flights').textContent = s.total_flights;
      document.getElementById('distance').textContent = fmt(s.total_distance_km);
      const min = s.flight_time.total_minutes;
      const d = Math.floor(min / 1440), h = Math.floor((min % 1440) / 60);
      document.getElementById('flight-time').innerHTML = `${d}<small>d</small> ${h}<small>h</small>`;
      document.getElementById('airports').textContent = s.airports.count;
      document.getElementById('airlines').textContent = s.airlines.count;

      const home = s.airports.ranking[0]?.iata ?? '';
      document.getElementById('home-base').textContent = home;
      document.getElementById('first-flight').textContent = shortDate(s.first_flight_date);
      document.getElementById('updated').textContent = shortDate(s.generated_at);

      const flags = document.getElementById('flags');
      for (const v of s.countries.including_layovers.visits) {
        flags.insertAdjacentHTML('beforeend', `<span title="${v.country_name}">${flagOf(v.country_code)}</span>`);
      }

      // フッター: MRZ風の装飾を横幅いっぱいに（.fillの'<'連続をflexで敷き詰めてクリップ）
      const since = shortDate(s.first_flight_date).replaceAll(' ', '');
      const issued = shortDate(s.generated_at).replaceAll(' ', '');
      document.getElementById('mrz').innerHTML =
        `<div class="line"><span>ALLTIME&lt;&lt;&lt;&lt;SINCE${since}&lt;&lt;${s.total_flights}FLIGHTS</span><span class="fill">${FILL.replaceAll('<', '&lt;')}</span></div>` +
        `<div class="line"><span>ISSUED${issued}${home}</span><span class="fill">${FILL.replaceAll('<', '&lt;')}</span><span>FLIGHT-LOG</span></div>`;

      drawMap(geo, s.globe);
      addEventListener('resize', () => drawMap(geo, s.globe));
    }).catch(() => {
      document.body.innerHTML = '<p style="font-family:system-ui;color:#eef0fa">Failed to load stats.</p>';
    });
  </script>
</body>
</html>
