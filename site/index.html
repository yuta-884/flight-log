<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>flight-log</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem; color: #222; }
    .count { font-size: 4rem; font-weight: 700; }
    .muted { color: #888; }
  </style>
</head>
<body>
  <h1>flight-log</h1>
  <p class="muted">Phase 1 プレースホルダー。統計・地球儀は Phase 2/3 で実装予定。</p>
  <div class="count" id="count">–</div>
  <p>フライト記録</p>
  <p class="muted" id="latest"></p>
  <script>
    // 表示は保存済みJSONのみを読む（API非依存の設計原則）
    fetch('data/flights.json')
      .then((r) => r.json())
      .then((flights) => {
        document.getElementById('count').textContent = flights.length;
        const last = flights[flights.length - 1];
        if (last) {
          document.getElementById('latest').textContent =
            `最新: ${last.flight_date} ${last.flight_number} ${last.origin_iata}→${last.destination_iata}`;
        }
      })
      .catch(() => { document.getElementById('count').textContent = '?'; });
  </script>
</body>
</html>
