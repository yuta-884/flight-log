<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FLIGHT LOG</title>
  <meta property="og:title" content="FLIGHT LOG">
  <meta property="og:description" content="Personal flight log — stats, routes and a 3D globe.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://yuta-884.github.io/flight-log/">
  <style>
    :root {
      --fg: #1c1c2e; --muted: #6f7288; --bg: #eef0f7; --card: #ffffff;
      --accent: #2456e6; --accent2: #16b8c9; --row: #e7e9f2;
      --glow: 0 20px 45px rgba(36, 86, 230, .10), 0 2px 10px rgba(20, 20, 40, .06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #eef0fa; --muted: #8e93ad; --bg: #0b0d16; --card: #151827;
        --accent: #6f96ff; --accent2: #3fe0d0; --row: #232841;
        --glow: 0 20px 50px rgba(30, 60, 180, .22), 0 2px 12px rgba(0, 0, 0, .45);
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif; color: var(--fg); max-width: 52rem;
      margin: 0 auto; padding: 2rem 1rem 4rem; min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(60rem 30rem at 110% -10%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 60%),
        radial-gradient(50rem 28rem at -20% 110%, color-mix(in srgb, var(--accent2) 12%, transparent), transparent 60%);
      background-attachment: fixed;
    }
    h1 { font-size: 1.5rem; margin: 0 0 .25rem; letter-spacing: .02em; }
    .sub { color: var(--muted); font-size: .8rem; margin-bottom: 2rem; }
    .cards { display: grid; gap: 1.1rem; margin-top: 1.1rem; }
    .cards.two { grid-template-columns: repeat(2, 1fr); }
    .cards.three { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 44rem) { .cards.two, .cards.three { grid-template-columns: 1fr; } }
    .card {
      position: relative; border: none; border-radius: 1.1rem; padding: 1.2rem 1.35rem;
      background:
        linear-gradient(155deg, color-mix(in srgb, var(--card) 88%, var(--accent)) 0%, var(--card) 45%);
      box-shadow: var(--glow);
      overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; inset: 0 0 auto 0; height: 1px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent2) 55%, transparent), transparent);
    }
    .card h2 {
      font-size: .68rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .18em; margin: 0 0 .6rem;
    }
    .big {
      font-size: 2.3rem; font-weight: 800; line-height: 1.1; letter-spacing: -.01em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .unit { font-size: 1rem; font-weight: 500; }
    .pair { display: flex; gap: 2rem; }
    .pair .label { font-size: .72rem; color: var(--muted); }
    .conversions {
      font-size: .8rem; color: var(--muted); margin-top: .55rem;
      display: grid; grid-template-columns: repeat(2, minmax(0, max-content));
      gap: .2rem 2rem;
    }
    table { width: 100%; border-collapse: collapse; margin-top: .6rem; font-size: .9rem; }
    th, td { text-align: right; padding: .38rem .5rem; border-bottom: 1px solid var(--row); }
    tr:last-child td { border-bottom: none; }
    th:first-child, td:first-child { text-align: left; }
    th { color: var(--muted); font-weight: 600; font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; }
    #countries-card { margin-top: 1.1rem; }
    #globe-card { margin-top: 1.1rem; padding: 0; }
    #globe { height: 30rem; cursor: grab; }
    #globe:active { cursor: grabbing; }
    @media (max-width: 44rem) { #globe { height: 22rem; } }
    #globe .scene-tooltip {
      color: var(--accent2);
      background: var(--card);
      padding: .3rem .65rem;
      border-radius: .5rem;
      font-family: system-ui, sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .06em;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .35);
    }
    .flags { margin-top: .9rem; font-size: 1.9rem; line-height: 1.45; letter-spacing: .15em; }
    .flags .transit { opacity: .35; }
    .legend { font-size: .72rem; color: var(--muted); margin-top: .4rem; }
    #error { color: #e05252; }
  </style>
</head>
<body>
  <h1>✈️ FLIGHT LOG</h1>
  <p class="sub" id="updated">Loading…</p>
  <p id="error" hidden>Failed to load stats.json.</p>

  <div class="card" id="globe-card" hidden>
    <div id="globe"></div>
  </div>

  <div id="cards" hidden>
    <div class="cards two">
      <div class="card">
        <h2>Distance</h2>
        <div class="big" id="distance">–</div>
      </div>
      <div class="card">
        <h2>Flight Time</h2>
        <div class="big" id="flight-time">–</div>
        <div class="conversions" id="flight-time-conv"></div>
      </div>
    </div>
    <div class="cards three">
      <div class="card">
        <h2>Flights</h2>
        <div class="big" id="total-flights">–</div>
        <table id="by-year"><thead><tr><th>Year</th><th>Flights</th><th>Distance (km)</th></tr></thead><tbody></tbody></table>
      </div>
      <div class="card">
        <h2>Airports</h2>
        <div class="big" id="airport-count">–</div>
        <table id="top-airports"><thead><tr><th>Airport</th><th>Visits</th></tr></thead><tbody></tbody></table>
      </div>
      <div class="card">
        <h2>Airlines</h2>
        <div class="big" id="airline-count">–</div>
        <table id="top-airlines"><thead><tr><th>Airline</th><th>Flights</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
  </div>

  <div class="card" id="countries-card" hidden>
    <h2>Countries &amp; Territories</h2>
    <div class="pair">
      <div><div class="big" id="countries-excl">–</div><div class="label">Excl. layovers</div></div>
      <div><div class="big" id="countries-incl">–</div><div class="label">Incl. layovers</div></div>
    </div>
    <div class="flags" id="flags"></div>
    <div class="legend">Dimmed flags are layover-only</div>
  </div>

  <script src="vendor/globe.gl.min.js"></script>
  <script>
    // 表示は集計済みJSONのみを読む（API非依存の設計原則）。stats.jsonはデプロイ時に生成される
    const fmt = (n) => n.toLocaleString('en-US');

    // 地球儀（globe.gl）: 全ルートを大圏アークで描画。陸地は同梱GeoJSONの六角形表現
    // （テクスチャ・CDN不使用でオフライン動作）。ドラッグ/タッチで回転、自動回転つき
    function initGlobe(globeData) {
      if (typeof Globe !== 'function') return; // vendorバンドル未読込時は地球儀なしで続行
      const el = document.getElementById('globe');
      document.getElementById('globe-card').hidden = false;
      const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
      const accent2 = getComputedStyle(document.documentElement).getPropertyValue('--accent2').trim();
      const globe = new Globe(el)
        .width(el.clientWidth)
        .height(el.clientHeight)
        .backgroundColor('rgba(0,0,0,0)')
        .showGlobe(true)
        .showAtmosphere(true)
        .atmosphereColor(accent)
        .atmosphereAltitude(0.18)
        .arcsData(globeData.routes)
        .arcStartLat((r) => r.from.lat).arcStartLng((r) => r.from.lon)
        .arcEndLat((r) => r.to.lat).arcEndLng((r) => r.to.lon)
        .arcColor(() => [accent, accent2])
        .arcStroke((r) => 0.25 + Math.min(r.count, 8) * 0.06)
        .arcAltitudeAutoScale(0.35)
        .arcsTransitionDuration(0)
        .pointsData(globeData.airports)
        .pointLat((a) => a.lat).pointLng((a) => a.lon)
        .pointColor(() => accent2)
        .pointAltitude(0.005)
        .pointRadius((a) => 0.35 + Math.min(a.count, 40) * 0.015)
        // 常時表示のラベルは置かず、空港ドットへのホバーでスリーレターのみ表示
        .pointLabel((a) => a.iata)
        // ホバー中は自動回転を止める（回転でホバーが勝手に外れるのを防ぐ）
        .onPointHover((p) => { globe.controls().autoRotate = !p; });
      window.flightGlobe = globe; // デバッグ・検証用
      const mat = globe.globeMaterial();
      mat.color.set('#0c1122');
      globe.controls().autoRotate = true;
      globe.controls().autoRotateSpeed = 0.6;
      globe.pointOfView({ lat: 25, lng: 120, altitude: 1.9 });
      fetch('vendor/countries.geojson')
        .then((r) => r.json())
        .then((geo) => {
          globe
            .hexPolygonsData(geo.features)
            .hexPolygonResolution(3)
            .hexPolygonMargin(0.6)
            .hexPolygonColor(() => 'rgba(111, 150, 255, 0.32)');
        })
        .catch(() => {}); // 陸地なしでもアークは描ける
      addEventListener('resize', () => globe.width(el.clientWidth).height(el.clientHeight));
    }
    // ISO 3166-1 alpha-2 → 絵文字国旗（Regional Indicator Symbols）
    const flagOf = (cc) => String.fromCodePoint(...[...cc].map((c) => 0x1f1e6 + c.charCodeAt(0) - 65));
    fetch('data/stats.json')
      .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then((s) => {
        document.getElementById('total-flights').textContent = fmt(s.total_flights);
        document.getElementById('distance').innerHTML = `${fmt(s.total_distance_km)}<span class="unit"> km</span>`;

        const min = s.flight_time.total_minutes;
        document.getElementById('flight-time').innerHTML =
          `${fmt(Math.floor(min / 60))}<span class="unit">h</span> ${min % 60}<span class="unit">m</span>`;
        const days = min / 1440;
        document.getElementById('flight-time-conv').innerHTML = [
          `${days.toFixed(1)} Days`,
          `${(days / 7).toFixed(1)} Weeks`,
          `${(days / 30.44).toFixed(1)} Months`,
          `${(days / 365.25).toFixed(2)} Years`,
        ].map((t) => `<span>${t}</span>`).join('');

        document.getElementById('airport-count').textContent = s.airports.count;
        const airportBody = document.querySelector('#top-airports tbody');
        for (const a of s.airports.ranking.slice(0, 5)) {
          airportBody.insertAdjacentHTML('beforeend', `<tr><td><strong>${a.iata}</strong></td><td>${a.count}</td></tr>`);
        }
        document.getElementById('airline-count').textContent = s.airlines.count;
        const airlineBody = document.querySelector('#top-airlines tbody');
        for (const a of s.airlines.ranking.slice(0, 5)) {
          airlineBody.insertAdjacentHTML('beforeend', `<tr><td><strong>${a.code}</strong> ${a.name ?? ''}</td><td>${a.count}</td></tr>`);
        }

        const yearBody = document.querySelector('#by-year tbody');
        for (const [year, v] of Object.entries(s.flights_by_year).sort((a, b) => b[0].localeCompare(a[0]))) {
          yearBody.insertAdjacentHTML('beforeend', `<tr><td>${year}</td><td>${v.flights}</td><td>${fmt(v.distance_km)}</td></tr>`);
        }

        document.getElementById('countries-excl').textContent = s.countries.excluding_layovers.count;
        document.getElementById('countries-incl').textContent = s.countries.including_layovers.count;
        const visited = new Set(s.countries.excluding_layovers.visits.map((v) => v.country_code));
        const flags = document.getElementById('flags');
        for (const v of s.countries.including_layovers.visits) {
          const transit = visited.has(v.country_code) ? '' : ' class="transit"';
          flags.insertAdjacentHTML('beforeend',
            `<span${transit} title="${v.country_name}">${flagOf(v.country_code)}</span>`);
        }

        document.getElementById('updated').textContent = `Last updated: ${new Date(s.generated_at).toLocaleString('en-US')}`;
        document.getElementById('cards').hidden = false;
        document.getElementById('countries-card').hidden = false;
        if (s.globe) initGlobe(s.globe);
      })
      .catch(() => {
        document.getElementById('updated').hidden = true;
        document.getElementById('error').hidden = false;
      });
  </script>
</body>
</html>
